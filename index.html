<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</head>

<body>
<!-- Task 1 -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Softinn</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarElements"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
                </button>

            <div class="collapse navbar-collapse" id="navbarElements">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
        </nav>

<!-- Task 2 -->
        <section class="bg-light">
            <div class="container text-center p-5">
                <div class="row g-4">
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="card">
                            <img src="image.png" class="card-img-top" height="250px">
                            <div class="card-body">
                                <h5 class="card-title">Card 1</h5>
                                <p class="card-text">This is the first card.</p>
                                <a href="#" class="btn btn-primary">Button 1</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="card">
                            <img src="image.png" class="card-img-top" height="250px">
                            <div class="card-body">
                                <h5 class="card-title">Card 2</h5>
                                <p class="card-text">This is the second card.</p>
                                <a href="#" class="btn btn-primary">Button 2</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="card">
                            <img src="image.png" class="card-img-top" height="250px">
                            <div class="card-body">
                                <h5 class="card-title">Card 3</h5>
                                <p class="card-text">This is the third card.</p>
                                <a href="#" class="btn btn-primary">Button 3</a>
                            </div>
                        </div>
                    </div>
                    </div>
                </div>
            </div>
        </section>

<!-- Task 3 -->
        <section>
            <div class="p-5 bg-dark">
                <h2 class="text-center mb-5 text-white">Contact Us</h2>
                <form>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="name" placeholder="Your Name">
                        <label for="name" class="form-label">Name</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="email" placeholder="name@example.com">
                        <label for="email" class="form-label">Email</label>
                    </div>
                    <div class="form-floating mb-3">
                        <textarea class="form-control" placeholder="Leave a message here" id="message" style="height: 120px"></textarea>
                        <label for="message">Message</label>
                    </div>
                    <button type="submit" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#targetModal" onclick="fillModal()">Submit</button>
                </form>
            </div>
        </section>

<!-- Task 4 -->
        <div class="modal fade" id="targetModal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content bg-dark text-white" data-bs-theme="dark">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Submitted Successfully</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p><strong>Name:</strong> <span id="modalName"></span></p>
                    <p><strong>Email:</strong> <span id="modalEmail"></span></p>
                    <p><strong>Message:</strong></p>
                    <p id="modalMessage"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
                </div>
            </div>
        </div>
</body>

</html>
